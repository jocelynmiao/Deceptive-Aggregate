<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Deceptive Global Aggregate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="style.css" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="code.js" type="module" defer></script>
  </head>
  <body>

    <!-- Top progress bar -->
    <div id="progress-bar-track">
      <div id="progress-bar-fill"></div>
    </div>

    <!-- D3 Tooltip (shared) -->
    <div class="d3-tooltip" id="d3-tooltip"></div>

    <!-- Main app grid -->
    <div id="app">

      <!-- Header -->
      <header id="header">
        <span id="site-title">The Deceptive Global Aggregate</span>
        <span id="slide-label"></span>
      </header>

      <!-- Slide viewport -->
      <main id="slide-viewport">
        <div id="content"></div>

        <!-- nav buttons -->
        <button class="nav-btn" id="restart-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.96"/></svg>
          Start over
        </button>
        <button class="nav-btn" id="prev-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Prev
        </button>
        <button class="nav-btn" id="next-btn">
          Next
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </main>
    </div>
  </body>
</html>
